version: '3'
services:
  wordpress:
    image: wordpress:7.0.0-php8.5-apache
    restart: unless-stopped
    ports:
      - 8080:80
    depends_on:
      - mariadb
    environment:
      - WORDPRESS_DB_HOST=mariadb
      - WORDPRESS_DB_NAME=${MYSQL_DATABASE:-rkeplin}
      - WORDPRESS_DB_USER=${MYSQL_USER:-wordpress}
      - WORDPRESS_DB_PASSWORD=${MYSQL_PASSWORD:-changeme}
    volumes:
      - wp-content:/var/www/html/wp-content
      - .:/var/www/html/wp-content/themes/robkeplin-wordpress-theme
    networks:
      - net1

  mariadb:
    image: mariadb:11.4
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-rkeplin}
      - MYSQL_USER=${MYSQL_USER:-wordpress}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - net1

volumes:
  wp-content:
  mariadb-data:

networks:
  net1:
