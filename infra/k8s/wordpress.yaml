# WordPress app - stateless container, but wp-content (uploads/themes/plugins)
# is REAL user data living on a PVC. Must be populated from the legacy server's
# /wp-content before cutover.
#
# blog-php-conf mirrors the real /opt/apps/rkeplin-blog/php/upload.ini
# from jersey2.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wp-content
  namespace: blog
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: do-block-storage-retain
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blog-php-conf
  namespace: blog
data:
  uploads.ini: |
    file_uploads = On
    memory_limit = 500M
    upload_max_filesize = 500M
    post_max_size = 500M
    max_execution_time = 600
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-blog
  namespace: blog
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wordpress-blog
  template:
    metadata:
      labels:
        app: wordpress-blog
    spec:
      containers:
        - name: wordpress
          image: wordpress:7.0.0-php8.5-apache
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: mariadb-blog
            - name: WORDPRESS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: blog-env
                  key: MYSQL_DATABASE
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: blog-env
                  key: MYSQL_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blog-env
                  key: MYSQL_PASSWORD
            - name: ANALYTICS
              value: "1"
            - name: GOOGLE_ANALYTICS_ID
              value: UA-132054758-1
            - name: CONTACT_EMAIL
              value: rkeplin@gmail.com
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WP_HOME', 'https://www.rkeplin.com' );
                define('WP_SITEURL', 'https://www.rkeplin.com' );
                define('FORCE_SSL_ADMIN', true);
          volumeMounts:
            - name: wp-content
              mountPath: /var/www/html/wp-content
            - name: php-conf
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: uploads.ini
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: wp-content
          persistentVolumeClaim:
            claimName: wp-content
        - name: php-conf
          configMap:
            name: blog-php-conf
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress-blog
  namespace: blog
spec:
  selector:
    app: wordpress-blog
  ports:
    - name: http
      port: 80
      targetPort: 80
