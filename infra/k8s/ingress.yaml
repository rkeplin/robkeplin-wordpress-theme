# www.rkeplin.com serves the blog; rkeplin.com (apex) 301-redirects to it.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog
  namespace: blog
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - www.rkeplin.com
        - rkeplin.com
      secretName: blog-tls
  rules:
    - host: www.rkeplin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress-blog
                port:
                  number: 80
---
# No cert-manager annotation here - reuses the blog-tls secret issued above,
# since both hosts are listed in that Ingress's tls.hosts.
#
# permanent-redirect can't include $request_uri: this cluster runs
# ingress-nginx v1.12.0 with allow-snippet-annotations left at its default
# (false), and the admission webhook rejects nginx variables in this annotation.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-apex-redirect
  namespace: blog
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: https://www.rkeplin.com
spec:
  tls:
    - hosts:
        - rkeplin.com
      secretName: blog-tls
  rules:
    - host: rkeplin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress-blog
                port:
                  number: 80
